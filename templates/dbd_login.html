<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin - DBD Care</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --ink: #17324d;
            --muted: #64748b;
            --line: #d9e4ea;
            --teal: #0f766e;
            --teal-dark: #115e59;
            --red: #be123c;
        }

        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            background: #f7fbfb;
            color: var(--ink);
            font-family: Inter, "Segoe UI", Arial, sans-serif;
        }

        .login-card {
            width: min(92vw, 430px);
            background: #fff;
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 28px;
        }

        .brand-mark {
            width: 44px;
            height: 44px;
            border-radius: 8px;
            background: var(--teal);
            color: #fff;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 18px;
        }

        h1 {
            font-size: 1.55rem;
            font-weight: 800;
            margin-bottom: 8px;
        }

        p {
            color: var(--muted);
            margin-bottom: 22px;
        }

        .form-control {
            min-height: 46px;
            border-radius: 8px;
            border-color: #bfd0d8;
        }

        .form-label {
            font-weight: 800;
        }

        .btn-health {
            width: 100%;
            min-height: 46px;
            border-radius: 8px;
            border: 1px solid var(--teal);
            background: var(--teal);
            color: #fff;
            font-weight: 800;
        }

        .btn-health:hover {
            background: var(--teal-dark);
            border-color: var(--teal-dark);
            color: #fff;
        }

        .alert {
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <main class="login-card">
        <span class="brand-mark" aria-hidden="true"><i class="fa-solid fa-lock"></i></span>
        <h1>Login Admin</h1>
        <p>Masuk untuk mengelola rule, pertanyaan, opsi jawaban, dan nilai certainty factor.</p>

        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        <form method="post">
            <div class="mb-3">
                <label class="form-label" for="username">Username</label>
                <input class="form-control" id="username" name="username" autocomplete="username" required>
            </div>
            <div class="mb-4">
                <label class="form-label" for="password">Password</label>
                <input class="form-control" id="password" type="password" name="password" autocomplete="current-password" required>
            </div>
            <button class="btn-health" type="submit"><i class="fa-solid fa-right-to-bracket me-2"></i>Masuk</button>
        </form>
    </main>
</body>
</html>
